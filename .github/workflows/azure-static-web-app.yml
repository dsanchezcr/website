name: Build and Deploy Website with Managed API

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/codeql.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths-ignore:
      - '.github/workflows/codeql.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event_name == 'push' && 'Production' || 'Preview' }}
      url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Dependencies
        run: npm ci

      - name: Run Frontend Tests
        run: npm test

      - name: Build .NET API
        run: dotnet build --configuration Release
        working-directory: api

      - name: Run Backend Tests
        run: dotnet test api.tests/api.tests.csproj --configuration Release

      - name: Build Docusaurus Website
        run: npm run build

      # Build the standalone admin SPA into build/admin so it ships with the same SWA deploy.
      # Must run AFTER the Docusaurus build (which populates build/).
      - name: Install Admin SPA Dependencies
        run: npm ci
        working-directory: admin

      - name: Type-check Admin SPA
        run: npm run typecheck
        working-directory: admin

      - name: Build Admin SPA
        run: npm run build
        working-directory: admin

      - name: Lighthouse CI - Performance Audit
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          staticDistDir: build
          configPath: .github/lighthouserc.json

      - name: Install Playwright Browsers
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npx playwright test

      - name: Upload Playwright Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Inject Entra tenant ID into SWA config
        env:
          AAD_TENANT_ID: ${{ vars.AAD_TENANT_ID }}
          IS_PRODUCTION: ${{ github.event_name == 'push' }}
        run: |
          CONFIG="build/staticwebapp.config.json"
          if ! grep -q '<AAD_TENANT_ID>' "$CONFIG"; then
            echo "No <AAD_TENANT_ID> placeholder in $CONFIG; nothing to inject."
            exit 0
          fi
          if [ -z "$AAD_TENANT_ID" ]; then
            if [ "$IS_PRODUCTION" = "true" ]; then
              echo "::error::Repository variable AAD_TENANT_ID is not set. Add it under Settings → Secrets and variables → Actions → Variables so Entra ID auth (the /admin app) works in production."
              exit 1
            fi
            echo "::warning::AAD_TENANT_ID not set; leaving placeholder (preview auth for /admin will not work)."
            exit 0
          fi
          sed -i "s/<AAD_TENANT_ID>/${AAD_TENANT_ID}/g" "$CONFIG"
          echo "Injected AAD_TENANT_ID into $CONFIG."

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'build'
          api_location: 'api'
          skip_app_build: true

      - name: Update Search Index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          # Wait for deployment to propagate
          echo "Waiting 30 seconds for deployment to propagate..."
          sleep 30
          
          # Extract content from source files to a temp file (safer for large payloads)
          echo "Extracting content from MDX files..."
          node scripts/extract-content.js > /tmp/content.json
          
          # Validate JSON was created
          if [ ! -s /tmp/content.json ]; then
            echo "::warning::Content extraction produced empty output"
            exit 0
          fi
          
          # Call the reindex endpoint using file input (avoids shell variable limits)
          echo "Calling reindex API..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ vars.WEBSITE_URL }}/api/reindex" \
            -H "X-Reindex-Key: ${{ secrets.REINDEX_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            -d @/tmp/content.json)
          
          # Clean up temp file
          rm -f /tmp/content.json
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response: $body"
          echo "Status: $http_code"
          
          if [ "$http_code" != "200" ]; then
            echo "::warning::Search index update returned status $http_code"
          else
            echo "::notice::Search index updated successfully"
          fi

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'close'