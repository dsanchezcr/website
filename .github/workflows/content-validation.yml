name: Content Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'blog/**'
      - 'gaming/**'
      - 'movies-tv/**'
      - 'disney/**'
      - 'universal/**'
      - 'src/data/movies.json'
      - 'src/data/series.json'
      - 'src/data/gaming/**'
      - 'static/img/gaming/**'
      - 'src/data/disney-parks.json'
      - 'src/data/universal-parks.json'
      - 'i18n/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Blog Post Frontmatter
        run: |
          echo "Checking blog post frontmatter..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'blog/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            echo "  Checking $file"

            # Check required frontmatter fields
            for field in title description tags authors; do
              if ! head -50 "$file" | grep -qi "^${field}:"; then
                echo "::error file=$file::Missing required frontmatter field: $field"
                errors=$((errors + 1))
              fi
            done
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors frontmatter issues"
            exit 1
          fi
          echo "Blog frontmatter validation passed"

      - name: Validate Blog i18n Coverage
        run: |
          echo "Checking blog post translations..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'blog/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            basename=$(basename "$file")
            echo "  Checking translations for $basename"

            es_path="i18n/es/docusaurus-plugin-content-blog/$basename"
            pt_path="i18n/pt/docusaurus-plugin-content-blog/$basename"

            if [ ! -f "$es_path" ]; then
              echo "::error file=$file::Missing Spanish translation: $es_path"
              errors=$((errors + 1))
            fi

            if [ ! -f "$pt_path" ]; then
              echo "::error file=$file::Missing Portuguese translation: $pt_path"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors missing blog translations"
            exit 1
          fi
          echo "Blog i18n check completed"

      - name: Validate Gaming i18n Coverage
        run: |
          echo "Checking gaming doc translations..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'gaming/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            # Convert gaming/xbox/index.mdx -> current/xbox/index.mdx
            relative="${file#gaming/}"
            echo "  Checking translations for $file"

            es_path="i18n/es/docusaurus-plugin-content-docs-gaming/current/$relative"
            pt_path="i18n/pt/docusaurus-plugin-content-docs-gaming/current/$relative"

            if [ ! -f "$es_path" ]; then
              echo "::warning file=$file::Missing Spanish gaming translation: $es_path"
              errors=$((errors + 1))
            fi

            if [ ! -f "$pt_path" ]; then
              echo "::warning file=$file::Missing Portuguese gaming translation: $pt_path"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors missing gaming translations"
            exit 1
          fi
          echo "Gaming i18n check completed"

      - name: Validate Gaming JSON Renderer Structure
        run: |
          echo "Checking JSON-driven renderer structure for gaming platform docs..."
          node -e "
          const fs = require('fs');
          let errors = 0;

          const platformDocs = [
            'gaming/xbox/index.mdx',
            'gaming/playstation/index.mdx',
            'gaming/nintendo-switch/index.mdx',
            'gaming/meta-quest/index.mdx',
            'gaming/phone-mobile/index.mdx',
            'gaming/board-games/index.mdx',
            'i18n/es/docusaurus-plugin-content-docs-gaming/current/xbox/index.mdx',
            'i18n/es/docusaurus-plugin-content-docs-gaming/current/playstation/index.mdx',
            'i18n/es/docusaurus-plugin-content-docs-gaming/current/nintendo-switch/index.mdx',
            'i18n/es/docusaurus-plugin-content-docs-gaming/current/meta-quest/index.mdx',
            'i18n/es/docusaurus-plugin-content-docs-gaming/current/phone-mobile/index.mdx',
            'i18n/es/docusaurus-plugin-content-docs-gaming/current/board-games/index.mdx',
            'i18n/pt/docusaurus-plugin-content-docs-gaming/current/xbox/index.mdx',
            'i18n/pt/docusaurus-plugin-content-docs-gaming/current/playstation/index.mdx',
            'i18n/pt/docusaurus-plugin-content-docs-gaming/current/nintendo-switch/index.mdx',
            'i18n/pt/docusaurus-plugin-content-docs-gaming/current/meta-quest/index.mdx',
            'i18n/pt/docusaurus-plugin-content-docs-gaming/current/phone-mobile/index.mdx',
            'i18n/pt/docusaurus-plugin-content-docs-gaming/current/board-games/index.mdx'
          ];

          platformDocs.forEach((file) => {
            if (!fs.existsSync(file)) {
              console.log('::error file=' + file + '::Missing required gaming platform doc');
              errors++;
              return;
            }

            const content = fs.readFileSync(file, 'utf-8');

            if (!content.includes('GamingEntriesRenderer')) {
              console.log('::error file=' + file + '::Must use GamingEntriesRenderer for platform entries');
              errors++;
            }

            if (!content.includes("@site/src/data/gaming/")) {
              console.log('::error file=' + file + '::Must import platform JSON from src/data/gaming');
              errors++;
            }

            if (content.includes("import GameCard from") || content.includes("import GameCardGroup from")) {
              console.log('::error file=' + file + '::Do not use inline GameCard/GameCardGroup imports in platform docs');
              errors++;
            }
          });

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' gaming renderer structure issues');
            process.exit(1);
          }

          console.log('Gaming JSON renderer structure validation passed');
          "

      - name: Validate Docs Locale Parity
        run: |
          echo "Checking docs locale parity across en/es/pt..."
          node -e "
          const fs = require('fs');
          const path = require('path');

          let errors = 0;
          const exts = new Set(['.md', '.mdx']);
          const sections = [
            { en: 'disney', es: 'i18n/es/docusaurus-plugin-content-docs-disney/current', pt: 'i18n/pt/docusaurus-plugin-content-docs-disney/current' },
            { en: 'gaming', es: 'i18n/es/docusaurus-plugin-content-docs-gaming/current', pt: 'i18n/pt/docusaurus-plugin-content-docs-gaming/current' },
            { en: 'movies-tv', es: 'i18n/es/docusaurus-plugin-content-docs-movies-tv/current', pt: 'i18n/pt/docusaurus-plugin-content-docs-movies-tv/current' },
            { en: 'projects', es: 'i18n/es/docusaurus-plugin-content-docs-projects/current', pt: 'i18n/pt/docusaurus-plugin-content-docs-projects/current' },
            { en: 'universal', es: 'i18n/es/docusaurus-plugin-content-docs-universal/current', pt: 'i18n/pt/docusaurus-plugin-content-docs-universal/current' }
          ];

          const listFiles = (root) => {
            const result = [];
            if (!fs.existsSync(root)) return result;

            const walk = (dir) => {
              fs.readdirSync(dir, { withFileTypes: true }).forEach((entry) => {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walk(fullPath);
                  return;
                }

                if (exts.has(path.extname(entry.name))) {
                  result.push(path.relative(root, fullPath).replace(/\\\\/g, '/'));
                }
              });
            };

            walk(root);
            return result;
          };

          sections.forEach((section) => {
            const enFiles = new Set(listFiles(section.en));
            const esFiles = new Set(listFiles(section.es));
            const ptFiles = new Set(listFiles(section.pt));

            enFiles.forEach((file) => {
              if (!esFiles.has(file)) {
                console.log('::error file=' + section.en + '/' + file + '::Missing Spanish counterpart in ' + section.es + '/' + file);
                errors++;
              }
              if (!ptFiles.has(file)) {
                console.log('::error file=' + section.en + '/' + file + '::Missing Portuguese counterpart in ' + section.pt + '/' + file);
                errors++;
              }
            });

            esFiles.forEach((file) => {
              if (!enFiles.has(file)) {
                console.log('::error file=' + section.es + '/' + file + '::No matching English source file at ' + section.en + '/' + file);
                errors++;
              }
            });

            ptFiles.forEach((file) => {
              if (!enFiles.has(file)) {
                console.log('::error file=' + section.pt + '/' + file + '::No matching English source file at ' + section.en + '/' + file);
                errors++;
              }
            });
          });

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' docs locale parity issues');
            process.exit(1);
          }

          console.log('Docs locale parity validation passed');
          "

      - name: Validate Required Pages Locale Parity
        run: |
          echo "Checking required page locale parity for en/es/pt..."
          node -e "
          const fs = require('fs');

          let errors = 0;
          const requiredPageFiles = [
            'about.mdx',
            'contact.js',
            'exchangerates.js',
            'index.js',
            'weather.js'
          ];

          requiredPageFiles.forEach((file) => {
            const enPath = 'src/pages/' + file;
            const esPath = 'i18n/es/docusaurus-plugin-content-pages/' + file;
            const ptPath = 'i18n/pt/docusaurus-plugin-content-pages/' + file;

            if (!fs.existsSync(enPath)) {
              console.log('::error file=' + enPath + '::Missing required English page source');
              errors++;
            }

            if (!fs.existsSync(esPath)) {
              console.log('::error file=' + enPath + '::Missing Spanish page translation: ' + esPath);
              errors++;
            }

            if (!fs.existsSync(ptPath)) {
              console.log('::error file=' + enPath + '::Missing Portuguese page translation: ' + ptPath);
              errors++;
            }
          });

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' required page locale parity issues');
            process.exit(1);
          }

          console.log('Required page locale parity validation passed');
          "

      - name: Validate Media Data Schema
        run: |
          echo "Checking movies.json and series.json schema..."
          node -e "
          const fs = require('fs');
          let errors = 0;

          // Validate movies.json
          if (fs.existsSync('src/data/movies.json')) {
            const movies = JSON.parse(fs.readFileSync('src/data/movies.json', 'utf-8'));
            if (!Array.isArray(movies)) {
              console.log('::error file=src/data/movies.json::movies.json must be an array');
              errors++;
            }
            const validCats = ['recently-watched', 'top-movies', 'watchlist'];
            const ids = new Set();
            movies.forEach((m, i) => {
              if (!m.titleId || !/^tt\d+$/.test(m.titleId)) {
                console.log('::error file=src/data/movies.json::Entry ' + i + ': invalid titleId');
                errors++;
              }
              if (ids.has(m.titleId)) {
                console.log('::error file=src/data/movies.json::Duplicate titleId: ' + m.titleId);
                errors++;
              }
              ids.add(m.titleId);
              if (!validCats.includes(m.category)) {
                console.log('::error file=src/data/movies.json::Entry ' + m.titleId + ': invalid category \"' + m.category + '\"');
                errors++;
              }
              if (!m.review || typeof m.review !== 'object') {
                console.log('::error file=src/data/movies.json::Entry ' + m.titleId + ': missing review object');
                errors++;
              } else {
                ['en', 'es', 'pt'].forEach(lang => {
                  if (!(lang in m.review)) {
                    console.log('::error file=src/data/movies.json::Entry ' + m.titleId + ': missing review.' + lang);
                    errors++;
                  }
                });
              }
            });
          }

          // Validate series.json
          if (fs.existsSync('src/data/series.json')) {
            const series = JSON.parse(fs.readFileSync('src/data/series.json', 'utf-8'));
            if (!Array.isArray(series)) {
              console.log('::error file=src/data/series.json::series.json must be an array');
              errors++;
            }
            const validCats = ['currently-watching', 'completed', 'watchlist'];
            const ids = new Set();
            series.forEach((s, i) => {
              if (!s.titleId || !/^tt\d+$/.test(s.titleId)) {
                console.log('::error file=src/data/series.json::Entry ' + i + ': invalid titleId');
                errors++;
              }
              if (ids.has(s.titleId)) {
                console.log('::error file=src/data/series.json::Duplicate titleId: ' + s.titleId);
                errors++;
              }
              ids.add(s.titleId);
              if (!validCats.includes(s.category)) {
                console.log('::error file=src/data/series.json::Entry ' + s.titleId + ': invalid category \"' + s.category + '\"');
                errors++;
              }
              if (!s.review || typeof s.review !== 'object') {
                console.log('::error file=src/data/series.json::Entry ' + s.titleId + ': missing review object');
                errors++;
              } else {
                ['en', 'es', 'pt'].forEach(lang => {
                  if (!(lang in s.review)) {
                    console.log('::error file=src/data/series.json::Entry ' + s.titleId + ': missing review.' + lang);
                    errors++;
                  }
                });
              }
            });
          }

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' schema validation errors');
            process.exit(1);
          }
          console.log('Media data schema validation passed');
          "

      - name: Validate Theme Parks Data Schema
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          echo "Checking disney-parks.json and universal-parks.json schema..."
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          let errors = 0;

          const localizedKeys = ['en', 'es', 'pt'];
          const validCategories = new Set(['attraction', 'dining', 'shopping', 'entertainment', 'show', 'character-meet']);

          const validateLocalized = (value, file, label) => {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              console.log('::error file=' + file + '::' + label + ' must be an object with en/es/pt keys');
              errors++;
              return;
            }

            localizedKeys.forEach((lang) => {
              if (!(lang in value)) {
                console.log('::error file=' + file + '::' + label + ' is missing key: ' + lang);
                errors++;
              }
            });
          };

          const validateCoordinates = (value, file, label) => {
            if (!Array.isArray(value) || value.length !== 2 || value.some((coord) => typeof coord !== 'number')) {
              console.log('::error file=' + file + '::' + label + ' must be a [latitude, longitude] numeric array');
              errors++;
            }
          };

          const validateParksFile = (file) => {
            if (!fs.existsSync(file)) {
              return;
            }

            const parks = JSON.parse(fs.readFileSync(file, 'utf-8'));
            if (!Array.isArray(parks)) {
              console.log('::error file=' + file + '::Root value must be an array');
              errors++;
              return;
            }

            const parkIds = new Set();
            parks.forEach((park, parkIndex) => {
              const parkLabel = 'Park entry ' + parkIndex;

              if (!park || typeof park !== 'object' || Array.isArray(park)) {
                console.log('::error file=' + file + '::' + parkLabel + ' must be an object');
                errors++;
                return;
              }

              if (!park.parkId || typeof park.parkId !== 'string') {
                console.log('::error file=' + file + '::' + parkLabel + ' is missing a valid parkId');
                errors++;
              } else if (parkIds.has(park.parkId)) {
                console.log('::error file=' + file + '::Duplicate parkId: ' + park.parkId);
                errors++;
              } else {
                parkIds.add(park.parkId);
              }

              validateLocalized(park.name, file, park.parkId + '.name');
              validateLocalized(park.description, file, park.parkId + '.description');

              validateCoordinates(park.mapCenter, file, park.parkId + '.mapCenter');

              if (park.mapZoom != null && typeof park.mapZoom !== 'number') {
                console.log('::error file=' + file + '::' + park.parkId + '.mapZoom must be numeric');
                errors++;
              }

              if (!Array.isArray(park.items)) {
                console.log('::error file=' + file + '::' + park.parkId + '.items must be an array');
                errors++;
                return;
              }

              const itemIds = new Set();
              park.items.forEach((item, itemIndex) => {
                const itemLabel = park.parkId + '.items[' + itemIndex + ']';

                if (!item || typeof item !== 'object' || Array.isArray(item)) {
                  console.log('::error file=' + file + '::' + itemLabel + ' must be an object');
                  errors++;
                  return;
                }

                if (!item.id || typeof item.id !== 'string') {
                  console.log('::error file=' + file + '::' + itemLabel + ' is missing a valid id');
                  errors++;
                } else if (itemIds.has(item.id)) {
                  console.log('::error file=' + file + '::Duplicate item id in ' + park.parkId + ': ' + item.id);
                  errors++;
                } else {
                  itemIds.add(item.id);
                }

                if (!validCategories.has(item.category)) {
                  console.log('::error file=' + file + '::' + itemLabel + ' has invalid category: ' + item.category);
                  errors++;
                }

                validateLocalized(item.name, file, itemLabel + '.name');
                validateLocalized(item.review, file, itemLabel + '.review');
                validateLocalized(item.tips, file, itemLabel + '.tips');

                if (item.coordinates != null) {
                  validateCoordinates(item.coordinates, file, itemLabel + '.coordinates');
                }

                if (item.rating != null && (!Number.isInteger(item.rating) || item.rating < 1 || item.rating > 5)) {
                  console.log('::error file=' + file + '::' + itemLabel + '.rating must be null or an integer between 1 and 5');
                  errors++;
                }

                if (item.mustDo != null && typeof item.mustDo !== 'boolean') {
                  console.log('::error file=' + file + '::' + itemLabel + '.mustDo must be boolean');
                  errors++;
                }

                if (item.order != null && typeof item.order !== 'number') {
                  console.log('::error file=' + file + '::' + itemLabel + '.order must be numeric when provided');
                  errors++;
                }

                if (item.url != null && typeof item.url !== 'string') {
                  console.log('::error file=' + file + '::' + itemLabel + '.url must be a string when provided');
                  errors++;
                }
              });
            });
          };

          const changedFiles = new Set(
            execSync(
              'git diff --name-only --diff-filter=ACM ' + process.env.BASE_SHA + '...' + process.env.HEAD_SHA,
              { encoding: 'utf-8' }
            )
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
          );

          const candidateFiles = ['src/data/disney-parks.json', 'src/data/universal-parks.json'];
          const filesToValidate = candidateFiles.filter((file) => changedFiles.has(file));

          if (filesToValidate.length === 0) {
            console.log('No theme parks data files changed, skipping schema validation');
            process.exit(0);
          }

          filesToValidate.forEach(validateParksFile);

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' theme parks data schema validation errors');
            process.exit(1);
          }

          console.log('Theme parks data schema validation passed');
          "

      - name: Validate Gaming Data Schema
        run: |
          echo "Checking src/data/gaming/*.json schema..."
          node -e "
          const fs = require('fs');
          const path = require('path');

          let errors = 0;
          const validStatuses = new Set(['completed', 'playing', 'backlog', 'dropped']);

          const isObject = (value) => value && typeof value === 'object' && !Array.isArray(value);

          const isLocalizedTextObject = (value) => {
            if (!isObject(value)) return false;
            const allowedKeys = ['en', 'es', 'pt'];
            const keys = Object.keys(value);
            if (keys.length === 0) return false;
            if (!keys.every((key) => allowedKeys.includes(key))) return false;
            return keys.every((key) => typeof value[key] === 'string');
          };

          const validateTextField = (entry, fieldName, file, label, required = false, requireLocalizedObject = false) => {
            const value = entry[fieldName];

            if (value == null) {
              if (required) {
                console.log('::error file=' + file + '::' + label + '.' + fieldName + ' is required');
                errors++;
              }
              return;
            }

            if (typeof value === 'string') {
              if (requireLocalizedObject) {
                console.log('::error file=' + file + '::' + label + '.' + fieldName + ' must be localized with en/es/pt object');
                errors++;
                return;
              }

              if (required && value.trim().length === 0) {
                console.log('::error file=' + file + '::' + label + '.' + fieldName + ' must be a non-empty string');
                errors++;
              }
              return;
            }

            if (!isLocalizedTextObject(value)) {
              console.log('::error file=' + file + '::' + label + '.' + fieldName + ' must be a string or localized object with en/es/pt string keys');
              errors++;
              return;
            }

            if (required && (!value.en || value.en.trim().length === 0)) {
              console.log('::error file=' + file + '::' + label + '.' + fieldName + '.en must be a non-empty string when localized object is used');
              errors++;
            }
          };

          const validateCardLike = (entry, file, label) => {
            if (!isObject(entry)) {
              console.log('::error file=' + file + '::' + label + ' must be an object');
              errors++;
              return;
            }

            validateTextField(entry, 'title', file, label, true);

            if (!entry.platform || typeof entry.platform !== 'string') {
              console.log('::error file=' + file + '::' + label + '.platform must be a non-empty string');
              errors++;
            }

            if (entry.status != null && !validStatuses.has(entry.status)) {
              console.log('::error file=' + file + '::' + label + '.status must be one of: completed, playing, backlog, dropped');
              errors++;
            }

            if (entry.imageUrl != null && (typeof entry.imageUrl !== 'string' || !entry.imageUrl.startsWith('/img/'))) {
              console.log('::error file=' + file + '::' + label + '.imageUrl must be a string starting with /img/');
              errors++;
            }

            if (entry.url != null && typeof entry.url !== 'string') {
              console.log('::error file=' + file + '::' + label + '.url must be a string when provided');
              errors++;
            }

            validateTextField(entry, 'recommendation', file, label, false, true);
            validateTextField(entry, 'description', file, label, false, true);

            if (entry.coOp != null && typeof entry.coOp !== 'boolean') {
              console.log('::error file=' + file + '::' + label + '.coOp must be boolean when provided');
              errors++;
            }

            if (entry.online != null && typeof entry.online !== 'boolean') {
              console.log('::error file=' + file + '::' + label + '.online must be boolean when provided');
              errors++;
            }
          };

          const validateEntry = (entry, file, label) => {
            if (!isObject(entry)) {
              console.log('::error file=' + file + '::' + label + ' must be an object');
              errors++;
              return;
            }

            if (entry.type === 'card') {
              validateCardLike(entry, file, label);
              return;
            }

            if (entry.type === 'group') {
              validateTextField(entry, 'title', file, label, true);

              if (!entry.platform || typeof entry.platform !== 'string') {
                console.log('::error file=' + file + '::' + label + '.platform must be a non-empty string');
                errors++;
              }

              if (entry.status != null && !validStatuses.has(entry.status)) {
                console.log('::error file=' + file + '::' + label + '.status must be one of: completed, playing, backlog, dropped');
                errors++;
              }

              validateTextField(entry, 'recommendation', file, label, false, true);
              validateTextField(entry, 'description', file, label, false, true);

              if (entry.url != null && typeof entry.url !== 'string') {
                console.log('::error file=' + file + '::' + label + '.url must be a string when provided');
                errors++;
              }

              if (entry.imageUrl != null && (typeof entry.imageUrl !== 'string' || !entry.imageUrl.startsWith('/img/'))) {
                console.log('::error file=' + file + '::' + label + '.imageUrl must be a string starting with /img/ when provided');
                errors++;
              }

              if (entry.coOp != null && typeof entry.coOp !== 'boolean') {
                console.log('::error file=' + file + '::' + label + '.coOp must be boolean when provided');
                errors++;
              }

              if (entry.online != null && typeof entry.online !== 'boolean') {
                console.log('::error file=' + file + '::' + label + '.online must be boolean when provided');
                errors++;
              }

              if (!Array.isArray(entry.games) || entry.games.length === 0) {
                console.log('::error file=' + file + '::' + label + '.games must be a non-empty array');
                errors++;
                return;
              }

              entry.games.forEach((game, gameIndex) => {
                validateCardLike(game, file, label + '.games[' + gameIndex + ']');
              });
              return;
            }

            console.log('::error file=' + file + '::' + label + '.type must be either card or group');
            errors++;
          };

          const gamingDir = 'src/data/gaming';
          if (!fs.existsSync(gamingDir)) {
            console.log('No src/data/gaming directory found, skipping');
            process.exit(0);
          }

          const filesToValidate = fs
            .readdirSync(gamingDir)
            .filter((file) => file.endsWith('.json'))
            .map((file) => path.posix.join(gamingDir, file));

          if (filesToValidate.length === 0) {
            console.log('No gaming data files found, skipping schema validation');
            process.exit(0);
          }

          filesToValidate.forEach((file) => {
            let parsed;
            try {
              parsed = JSON.parse(fs.readFileSync(file, 'utf-8'));
            } catch (error) {
              console.log('::error file=' + file + '::Invalid JSON: ' + error.message);
              errors++;
              return;
            }

            if (!isObject(parsed)) {
              console.log('::error file=' + file + '::Root must be an object containing section arrays');
              errors++;
              return;
            }

            Object.entries(parsed).forEach(([sectionName, entries]) => {
              if (!Array.isArray(entries)) {
                console.log('::error file=' + file + '::Section ' + sectionName + ' must be an array');
                errors++;
                return;
              }

              entries.forEach((entry, index) => {
                validateEntry(entry, file, sectionName + '[' + index + ']');
              });
            });
          });

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' gaming data schema validation errors');
            process.exit(1);
          }

          console.log('Gaming data schema validation passed');
          "

      - name: Validate Gaming Data Image References
        run: |
          echo "Checking gaming data image references..."
          node -e "
          const fs = require('fs');
          const path = require('path');

          let errors = 0;

          const gamingDir = 'src/data/gaming';
          if (!fs.existsSync(gamingDir)) {
            console.log('No src/data/gaming directory found, skipping');
            process.exit(0);
          }

          const filesToValidate = fs
            .readdirSync(gamingDir)
            .filter((file) => file.endsWith('.json'))
            .map((file) => path.posix.join(gamingDir, file));

          if (filesToValidate.length === 0) {
            console.log('No gaming data files found, skipping image validation');
            process.exit(0);
          }

          const checkImagePath = (file, label, imageUrl) => {
            if (!imageUrl || typeof imageUrl !== 'string') return;
            if (!imageUrl.startsWith('/img/')) return;

            const localPath = path.join('static', imageUrl.replace(/^\//, ''));
            if (!fs.existsSync(localPath)) {
              console.log('::error file=' + file + '::' + label + ' references missing image: ' + localPath);
              errors++;
            }
          };

          filesToValidate.forEach((file) => {
            let parsed;
            try {
              parsed = JSON.parse(fs.readFileSync(file, 'utf-8'));
            } catch {
              return;
            }

            Object.entries(parsed || {}).forEach(([sectionName, entries]) => {
              if (!Array.isArray(entries)) return;

              entries.forEach((entry, index) => {
                checkImagePath(file, sectionName + '[' + index + '].imageUrl', entry.imageUrl);
                if (entry.type === 'group' && Array.isArray(entry.games)) {
                  entry.games.forEach((game, gameIndex) => {
                    checkImagePath(file, sectionName + '[' + index + '].games[' + gameIndex + '].imageUrl', game.imageUrl);
                  });
                }
              });
            });
          });

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' missing gaming data images');
            process.exit(1);
          }

          console.log('Gaming data image reference check passed');
          "

      - name: Validate Image References
        run: |
          echo "Checking that referenced gaming images exist..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'gaming/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            # Extract image paths from imageUrl props
            while IFS= read -r match; do
              img_path=$(echo "$match" | sed 's/imageUrl="//;s/"//')
              # Convert /img/... to static/img/...
              local_path="static${img_path}"
              if [ ! -f "$local_path" ]; then
                echo "::warning file=$file::Referenced image not found: $local_path"
                errors=$((errors + 1))
              fi
            done < <(grep -oP 'imageUrl="([^"]+)"' "$file" 2>/dev/null)
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors missing gaming images"
            exit 1
          fi
          echo "Image reference check completed"
