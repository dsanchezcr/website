name: Content Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'blog/**'
      - 'gaming/**'
      - 'movies-tv/**'
      - 'disney/**'
      - 'universal/**'
      - 'src/data/movies.json'
      - 'src/data/series.json'
      - 'src/data/disney-parks.json'
      - 'src/data/universal-parks.json'
      - 'i18n/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Blog Post Frontmatter
        run: |
          echo "Checking blog post frontmatter..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'blog/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            echo "  Checking $file"

            # Check required frontmatter fields
            for field in title description tags authors; do
              if ! head -50 "$file" | grep -qi "^${field}:"; then
                echo "::error file=$file::Missing required frontmatter field: $field"
                errors=$((errors + 1))
              fi
            done
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors frontmatter issues"
            exit 1
          fi
          echo "Blog frontmatter validation passed"

      - name: Validate Blog i18n Coverage
        run: |
          echo "Checking blog post translations..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'blog/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            basename=$(basename "$file")
            echo "  Checking translations for $basename"

            es_path="i18n/es/docusaurus-plugin-content-blog/$basename"
            pt_path="i18n/pt/docusaurus-plugin-content-blog/$basename"

            if [ ! -f "$es_path" ]; then
              echo "::error file=$file::Missing Spanish translation: $es_path"
              errors=$((errors + 1))
            fi

            if [ ! -f "$pt_path" ]; then
              echo "::error file=$file::Missing Portuguese translation: $pt_path"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors missing blog translations"
            exit 1
          fi
          echo "Blog i18n check completed"

      - name: Validate Gaming i18n Coverage
        run: |
          echo "Checking gaming doc translations..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'gaming/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            # Convert gaming/xbox/index.mdx -> current/xbox/index.mdx
            relative="${file#gaming/}"
            echo "  Checking translations for $file"

            es_path="i18n/es/docusaurus-plugin-content-docs-gaming/current/$relative"
            pt_path="i18n/pt/docusaurus-plugin-content-docs-gaming/current/$relative"

            if [ ! -f "$es_path" ]; then
              echo "::warning file=$file::Missing Spanish gaming translation: $es_path"
              errors=$((errors + 1))
            fi

            if [ ! -f "$pt_path" ]; then
              echo "::warning file=$file::Missing Portuguese gaming translation: $pt_path"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors missing gaming translations"
            exit 1
          fi
          echo "Gaming i18n check completed"

      - name: Validate Media Data Schema
        run: |
          echo "Checking movies.json and series.json schema..."
          node -e "
          const fs = require('fs');
          let errors = 0;

          // Validate movies.json
          if (fs.existsSync('src/data/movies.json')) {
            const movies = JSON.parse(fs.readFileSync('src/data/movies.json', 'utf-8'));
            if (!Array.isArray(movies)) {
              console.log('::error file=src/data/movies.json::movies.json must be an array');
              errors++;
            }
            const validCats = ['recently-watched', 'top-movies', 'watchlist'];
            const ids = new Set();
            movies.forEach((m, i) => {
              if (!m.titleId || !/^tt\d+$/.test(m.titleId)) {
                console.log('::error file=src/data/movies.json::Entry ' + i + ': invalid titleId');
                errors++;
              }
              if (ids.has(m.titleId)) {
                console.log('::error file=src/data/movies.json::Duplicate titleId: ' + m.titleId);
                errors++;
              }
              ids.add(m.titleId);
              if (!validCats.includes(m.category)) {
                console.log('::error file=src/data/movies.json::Entry ' + m.titleId + ': invalid category \"' + m.category + '\"');
                errors++;
              }
              if (!m.review || typeof m.review !== 'object') {
                console.log('::error file=src/data/movies.json::Entry ' + m.titleId + ': missing review object');
                errors++;
              } else {
                ['en', 'es', 'pt'].forEach(lang => {
                  if (!(lang in m.review)) {
                    console.log('::error file=src/data/movies.json::Entry ' + m.titleId + ': missing review.' + lang);
                    errors++;
                  }
                });
              }
            });
          }

          // Validate series.json
          if (fs.existsSync('src/data/series.json')) {
            const series = JSON.parse(fs.readFileSync('src/data/series.json', 'utf-8'));
            if (!Array.isArray(series)) {
              console.log('::error file=src/data/series.json::series.json must be an array');
              errors++;
            }
            const validCats = ['currently-watching', 'completed', 'watchlist'];
            const ids = new Set();
            series.forEach((s, i) => {
              if (!s.titleId || !/^tt\d+$/.test(s.titleId)) {
                console.log('::error file=src/data/series.json::Entry ' + i + ': invalid titleId');
                errors++;
              }
              if (ids.has(s.titleId)) {
                console.log('::error file=src/data/series.json::Duplicate titleId: ' + s.titleId);
                errors++;
              }
              ids.add(s.titleId);
              if (!validCats.includes(s.category)) {
                console.log('::error file=src/data/series.json::Entry ' + s.titleId + ': invalid category \"' + s.category + '\"');
                errors++;
              }
              if (!s.review || typeof s.review !== 'object') {
                console.log('::error file=src/data/series.json::Entry ' + s.titleId + ': missing review object');
                errors++;
              } else {
                ['en', 'es', 'pt'].forEach(lang => {
                  if (!(lang in s.review)) {
                    console.log('::error file=src/data/series.json::Entry ' + s.titleId + ': missing review.' + lang);
                    errors++;
                  }
                });
              }
            });
          }

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' schema validation errors');
            process.exit(1);
          }
          console.log('Media data schema validation passed');
          "

      - name: Validate Theme Parks Data Schema
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          echo "Checking disney-parks.json and universal-parks.json schema..."
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          let errors = 0;

          const localizedKeys = ['en', 'es', 'pt'];
          const validCategories = new Set(['attraction', 'dining', 'shopping', 'entertainment', 'show', 'character-meet']);

          const validateLocalized = (value, file, label) => {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              console.log('::error file=' + file + '::' + label + ' must be an object with en/es/pt keys');
              errors++;
              return;
            }

            localizedKeys.forEach((lang) => {
              if (!(lang in value)) {
                console.log('::error file=' + file + '::' + label + ' is missing key: ' + lang);
                errors++;
              }
            });
          };

          const validateCoordinates = (value, file, label) => {
            if (!Array.isArray(value) || value.length !== 2 || value.some((coord) => typeof coord !== 'number')) {
              console.log('::error file=' + file + '::' + label + ' must be a [latitude, longitude] numeric array');
              errors++;
            }
          };

          const validateParksFile = (file) => {
            if (!fs.existsSync(file)) {
              return;
            }

            const parks = JSON.parse(fs.readFileSync(file, 'utf-8'));
            if (!Array.isArray(parks)) {
              console.log('::error file=' + file + '::Root value must be an array');
              errors++;
              return;
            }

            const parkIds = new Set();
            parks.forEach((park, parkIndex) => {
              const parkLabel = 'Park entry ' + parkIndex;

              if (!park || typeof park !== 'object' || Array.isArray(park)) {
                console.log('::error file=' + file + '::' + parkLabel + ' must be an object');
                errors++;
                return;
              }

              if (!park.parkId || typeof park.parkId !== 'string') {
                console.log('::error file=' + file + '::' + parkLabel + ' is missing a valid parkId');
                errors++;
              } else if (parkIds.has(park.parkId)) {
                console.log('::error file=' + file + '::Duplicate parkId: ' + park.parkId);
                errors++;
              } else {
                parkIds.add(park.parkId);
              }

              validateLocalized(park.name, file, park.parkId + '.name');
              validateLocalized(park.description, file, park.parkId + '.description');

              validateCoordinates(park.mapCenter, file, park.parkId + '.mapCenter');

              if (park.mapZoom != null && typeof park.mapZoom !== 'number') {
                console.log('::error file=' + file + '::' + park.parkId + '.mapZoom must be numeric');
                errors++;
              }

              if (!Array.isArray(park.items)) {
                console.log('::error file=' + file + '::' + park.parkId + '.items must be an array');
                errors++;
                return;
              }

              const itemIds = new Set();
              park.items.forEach((item, itemIndex) => {
                const itemLabel = park.parkId + '.items[' + itemIndex + ']';

                if (!item || typeof item !== 'object' || Array.isArray(item)) {
                  console.log('::error file=' + file + '::' + itemLabel + ' must be an object');
                  errors++;
                  return;
                }

                if (!item.id || typeof item.id !== 'string') {
                  console.log('::error file=' + file + '::' + itemLabel + ' is missing a valid id');
                  errors++;
                } else if (itemIds.has(item.id)) {
                  console.log('::error file=' + file + '::Duplicate item id in ' + park.parkId + ': ' + item.id);
                  errors++;
                } else {
                  itemIds.add(item.id);
                }

                if (!validCategories.has(item.category)) {
                  console.log('::error file=' + file + '::' + itemLabel + ' has invalid category: ' + item.category);
                  errors++;
                }

                validateLocalized(item.name, file, itemLabel + '.name');
                validateLocalized(item.review, file, itemLabel + '.review');
                validateLocalized(item.tips, file, itemLabel + '.tips');

                if (item.coordinates != null) {
                  validateCoordinates(item.coordinates, file, itemLabel + '.coordinates');
                }

                if (item.rating != null && (!Number.isInteger(item.rating) || item.rating < 1 || item.rating > 5)) {
                  console.log('::error file=' + file + '::' + itemLabel + '.rating must be null or an integer between 1 and 5');
                  errors++;
                }

                if (item.mustDo != null && typeof item.mustDo !== 'boolean') {
                  console.log('::error file=' + file + '::' + itemLabel + '.mustDo must be boolean');
                  errors++;
                }

                if (item.order != null && typeof item.order !== 'number') {
                  console.log('::error file=' + file + '::' + itemLabel + '.order must be numeric when provided');
                  errors++;
                }

                if (item.url != null && typeof item.url !== 'string') {
                  console.log('::error file=' + file + '::' + itemLabel + '.url must be a string when provided');
                  errors++;
                }
              });
            });
          };

          const changedFiles = new Set(
            execSync(
              'git diff --name-only --diff-filter=ACM ' + process.env.BASE_SHA + '...' + process.env.HEAD_SHA,
              { encoding: 'utf-8' }
            )
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
          );

          const candidateFiles = ['src/data/disney-parks.json', 'src/data/universal-parks.json'];
          const filesToValidate = candidateFiles.filter((file) => changedFiles.has(file));

          if (filesToValidate.length === 0) {
            console.log('No theme parks data files changed, skipping schema validation');
            process.exit(0);
          }

          filesToValidate.forEach(validateParksFile);

          if (errors > 0) {
            console.log('::error::Found ' + errors + ' theme parks data schema validation errors');
            process.exit(1);
          }

          console.log('Theme parks data schema validation passed');
          "

      - name: Validate Image References
        run: |
          echo "Checking that referenced gaming images exist..."
          errors=0

          for file in $(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'gaming/**/*.mdx' 2>/dev/null || true); do
            if [ ! -f "$file" ]; then continue; fi
            # Extract image paths from imageUrl props
            while IFS= read -r match; do
              img_path=$(echo "$match" | sed 's/imageUrl="//;s/"//')
              # Convert /img/... to static/img/...
              local_path="static${img_path}"
              if [ ! -f "$local_path" ]; then
                echo "::warning file=$file::Referenced image not found: $local_path"
                errors=$((errors + 1))
              fi
            done < <(grep -oP 'imageUrl="([^"]+)"' "$file" 2>/dev/null)
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors missing gaming images"
            exit 1
          fi
          echo "Image reference check completed"
