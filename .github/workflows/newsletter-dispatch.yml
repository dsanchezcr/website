name: Newsletter Dispatch

on:
  schedule:
    # Weekly: Every Sunday at 8:00 AM UTC
    - cron: '0 8 * * 0'
    # Monthly: 1st of every month at 8:00 AM UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Newsletter frequency to dispatch'
        required: true
        type: choice
        options:
          - weekly
          - monthly
      custom_message:
        description: 'Optional custom message to include'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: newsletter-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    name: Send Newsletter
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine Frequency
        id: frequency
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.frequency }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 1 * *" ]; then
            echo "value=monthly" >> $GITHUB_OUTPUT
          else
            echo "value=weekly" >> $GITHUB_OUTPUT
          fi

      - name: Extract Recent Blog Posts
        id: content
        run: |
          FREQUENCY="${{ steps.frequency.outputs.value }}"
          
          if [ "$FREQUENCY" = "monthly" ]; then
            DAYS=30
          else
            DAYS=7
          fi
          
          # Find blog posts modified in the last N days
          CUTOFF_DATE=$(date -d "${DAYS} days ago" +%Y-%m-%d 2>/dev/null || date -v-${DAYS}d +%Y-%m-%d)
          
          echo "Looking for blog posts since ${CUTOFF_DATE}..."
          
          extract_posts() {
            local BLOG_DIR="$1"
            local POSTS="[]"
            for file in ${BLOG_DIR}/*.mdx; do
              if [ ! -f "$file" ]; then continue; fi
              
              # Get file modification date from git
              FILE_DATE=$(git log -1 --format="%cs" -- "$file" 2>/dev/null || echo "")
              if [ -z "$FILE_DATE" ]; then continue; fi
              
              # Compare dates
              if [[ "$FILE_DATE" > "$CUTOFF_DATE" ]] || [[ "$FILE_DATE" == "$CUTOFF_DATE" ]]; then
                # Extract frontmatter (strip only surrounding quotes, preserving internal apostrophes/quotes)
                TITLE=$(sed -n 's/^title: *//p' "$file" | head -1 | sed 's/^["'\'']\(.*\)["'\''"]$/\1/')
                DESCRIPTION=$(sed -n 's/^description: *//p' "$file" | head -1 | sed 's/^["'\'']\(.*\)["'\''"]$/\1/')
                # Prefer explicit frontmatter slug; fall back to filename (remove date prefix and extension)
                FRONTMATTER_SLUG=$(sed -n 's/^slug: *//p' "$file" | head -1 | sed 's/^["'\'']\(.*\)["'\''"]$/\1/')
                if [ -n "$FRONTMATTER_SLUG" ]; then
                  SLUG="$FRONTMATTER_SLUG"
                else
                  SLUG=$(basename "$file" .mdx | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
                fi
                
                if [ -n "$TITLE" ] && [ -n "$SLUG" ]; then
                  # Use jq to safely build JSON (handles quotes, backslashes, special chars)
                  POST=$(jq -n --arg s "$SLUG" --arg t "$TITLE" --arg d "${DESCRIPTION:-}" \
                    '{slug: $s, title: $t, description: $d}')
                  POSTS=$(echo "$POSTS" | jq --argjson post "$POST" '. + [$post]')
                fi
              fi
            done
            echo "$POSTS"
          }
          
          # Extract posts for each locale
          POSTS_EN=$(extract_posts "blog")
          POSTS_ES=$(extract_posts "i18n/es/docusaurus-plugin-content-blog")
          POSTS_PT=$(extract_posts "i18n/pt/docusaurus-plugin-content-blog")
          
          # Fall back to English if no localized posts found
          if [ "$(echo "$POSTS_ES" | jq length)" -eq 0 ]; then
            POSTS_ES="$POSTS_EN"
          fi
          if [ "$(echo "$POSTS_PT" | jq length)" -eq 0 ]; then
            POSTS_PT="$POSTS_EN"
          fi
          
          echo "Found EN posts: $POSTS_EN"
          echo "Found ES posts: $POSTS_ES"
          echo "Found PT posts: $POSTS_PT"
          echo "posts_en=$(echo "$POSTS_EN" | jq -c .)" >> $GITHUB_OUTPUT
          echo "posts_es=$(echo "$POSTS_ES" | jq -c .)" >> $GITHUB_OUTPUT
          echo "posts_pt=$(echo "$POSTS_PT" | jq -c .)" >> $GITHUB_OUTPUT

      - name: Dispatch Newsletter
        env:
          CUSTOM_MESSAGE: ${{ inputs.custom_message || '' }}
        run: |
          FREQUENCY="${{ steps.frequency.outputs.value }}"
          SITE_URL="https://dsanchezcr.com"
          
          dispatch_for_lang() {
            local LANG="$1"
            local POSTS="$2"
            
            BODY=$(jq -n \
              --arg freq "$FREQUENCY" \
              --argjson posts "$POSTS" \
              --arg msg "$CUSTOM_MESSAGE" \
              --arg lang "$LANG" \
              '{frequency: $freq, blogPosts: $posts, customMessage: $msg, language: $lang}')
            
            echo "Dispatching ${FREQUENCY} newsletter for language: ${LANG}..."
            
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-Newsletter-Key: ${{ secrets.NEWSLETTER_DISPATCH_KEY }}" \
              -d "$BODY" \
              "${SITE_URL}/api/newsletter/dispatch")
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
            
            echo "Response for ${LANG} (${HTTP_CODE}): ${RESPONSE_BODY}"
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Newsletter dispatched successfully for ${LANG}!"
            else
              echo "::warning::Newsletter dispatch for ${LANG} returned HTTP ${HTTP_CODE}"
            fi
          }
          
          POSTS_EN='${{ steps.content.outputs.posts_en }}'
          POSTS_ES='${{ steps.content.outputs.posts_es }}'
          POSTS_PT='${{ steps.content.outputs.posts_pt }}'
          
          dispatch_for_lang "en" "$POSTS_EN"
          dispatch_for_lang "es" "$POSTS_ES"
          dispatch_for_lang "pt" "$POSTS_PT"
